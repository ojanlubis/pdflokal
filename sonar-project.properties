sonar.projectKey=ojanlubis_pdflokal
sonar.organization=ojanlubis

# ---------------------------------------------------------------------------
# GENERATED FILES ARE EXCLUDED FROM ANALYSIS.
#
# The twelve SEO tool pages (gabung-pdf.html, kompres-pdf.html, …) are OUTPUT of
# scripts/gen-seo-pages.js, which templates them from index.html. They are
# committed on purpose — that is the whole "a generator is not a build step"
# decision (see the header of gen-seo-pages.js) — but they are artifacts, not
# source.
#
# Analysing them is worse than useless:
#   - Duplication went to 77.6%, because 12 pages each embed the same editor
#     shell. That is the design, not a defect. Nothing can be "fixed" there.
#   - Every finding in index.html gets reported 12 extra times, which buries the
#     one copy that a human can actually act on.
#
# You lint the SOURCE, not the output. The source IS analysed: index.html (the
# template), seo/pages.json (the copy), and scripts/gen-seo-pages.js itself. A
# real bug in a generated page is a bug in one of those three, and Sonar will
# still see it there.
#
# DO NOT add a new tool page to this list by hand — the glob covers them. If you
# ever hand-write an HTML page at the repo root, it must NOT match this pattern,
# or it silently stops being analysed.
# ---------------------------------------------------------------------------
sonar.exclusions=gabung-pdf.html,kompres-pdf.html,kompres-pdf-*.html,pisah-pdf.html,tanda-tangan-pdf.html,pdf-ke-jpg.html,jpg-ke-pdf.html,edit-pdf.html,hapus-halaman-pdf.html,js/vendor/**
