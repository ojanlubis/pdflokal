name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      runnable: ${{ steps.filter.outputs.runnable }}
    steps:
      - uses: actions/checkout@v6
      # Pinned to commit SHA per GitHub Actions supply-chain guidance.
      # SHA = dorny/paths-filter v4.0.1 release. Bump explicitly when needed.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            runnable:
              - 'index.html'
              - 'dukung.html'
              - 'privasi.html'
              - 'style.css'
              - 'vercel.json'
              - 'js/**'
              - 'api/**'
              - 'tests/**'
              - 'fonts/**'
              - 'playwright.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/e2e.yml'

  e2e:
    needs: changes
    if: needs.changes.outputs.runnable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install system deps for cached browser
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
