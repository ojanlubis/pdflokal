name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      # The SEO tool pages are GENERATED from seo/pages.json + index.html. Without
      # this, editing index.html and forgetting `npm run seo` silently leaves the
      # 12 tool pages on a stale copy of the app shell — and nothing would fail.
      - run: npm run seo:check
