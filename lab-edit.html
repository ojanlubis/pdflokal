<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>lab — edit teks asli · fase 1 (text-run intelligence)</title>
<style>
  :root { --ink: #1c1917; --paper: #fafaf9; --line: #d6d3d1; --red: #dc2626; --hit: rgba(220, 38, 38, .08); }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, sans-serif; background: var(--paper); color: var(--ink); padding-bottom: 130px; }
  header { padding: 10px 16px; border-bottom: 1px solid var(--line); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  header strong { color: var(--red); }
  header .note { color: #78716c; font-size: 12px; }
  .toolbar { padding: 10px 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  #stats { font-size: 12px; color: #57534e; }
  #router { font-weight: 600; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--line); }
  #router.digital { color: #166534; border-color: #166534; }
  #router.scan { color: #9a3412; border-color: #9a3412; }
  #pages { display: flex; flex-direction: column; gap: 20px; align-items: center; padding: 8px 16px; }
  .page-wrap { position: relative; box-shadow: 0 1px 6px rgba(0,0,0,.15); max-width: 100%; }
  .page-wrap canvas { display: block; max-width: 100%; height: auto; }
  .run { position: absolute; cursor: pointer; }
  body.show-boxes .run { outline: 1px solid rgba(220, 38, 38, .35); background: var(--hit); }
  .run.selected { outline: 2px solid var(--red); background: rgba(220, 38, 38, .18); }
  #panel { position: fixed; left: 0; right: 0; bottom: 0; background: #fff; border-top: 2px solid var(--red);
           padding: 10px 16px; font-family: ui-monospace, monospace; font-size: 12px; min-height: 110px; }
  #panel b { color: var(--red); font-family: system-ui, sans-serif; }
</style>
</head>
<body class="show-boxes">
<header>
  <strong>lab-edit · fase 1</strong>
  <span class="note">bukti: ekstraksi run teks + kotak koordinat + hit-test + router born-digital/scan. Halaman internal, noindex, bukan produk.</span>
</header>
<div class="toolbar">
  <input type="file" id="file" accept="application/pdf">
  <button id="load-sample">muat sample (tests/fixtures)</button>
  <label><input type="checkbox" id="toggle-boxes" checked> tampilkan kotak</label>
  <span id="router"></span>
  <span id="stats"></span>
</div>
<div id="pages"></div>
<aside id="panel">tap salah satu kotak merah di halaman untuk melihat isi run-nya…</aside>

<script type="module">
import { ensurePdfJs } from '/js/core/vendor.js';

const MAX_PAGES = 3; // fase 1: cukup untuk membuktikan mekanismenya
const pagesEl = document.getElementById('pages');
const panel = document.getElementById('panel');
const statsEl = document.getElementById('stats');
const routerEl = document.getElementById('router');

document.getElementById('toggle-boxes').addEventListener('change', (e) => {
  document.body.classList.toggle('show-boxes', e.target.checked);
});
document.getElementById('file').addEventListener('change', async (e) => {
  const f = e.target.files[0];
  if (f) open(new Uint8Array(await f.arrayBuffer()), f.name);
});
document.getElementById('load-sample').addEventListener('click', async () => {
  const res = await fetch('/tests/fixtures/sample-2pages.pdf');
  open(new Uint8Array(await res.arrayBuffer()), 'sample-2pages.pdf');
});

let selected = null;

async function open(data, name) {
  const pdfjs = await ensurePdfJs();
  const doc = await pdfjs.getDocument({ data }).promise;
  pagesEl.textContent = '';
  const fonts = new Set();
  let runCount = 0;

  const n = Math.min(doc.numPages, MAX_PAGES);
  for (let p = 1; p <= n; p++) {
    const page = await doc.getPage(p);
    // Skala render menyesuaikan lebar layar; semua koordinat run ikut viewport
    // yang SAMA, jadi kotak menempel tepat di atas glyph di kanvas.
    const base = page.getViewport({ scale: 1 });
    const scale = Math.min(2, (Math.min(900, pagesEl.clientWidth - 8)) / base.width);
    const viewport = page.getViewport({ scale });

    const wrap = document.createElement('div');
    wrap.className = 'page-wrap';
    const canvas = document.createElement('canvas');
    canvas.width = Math.floor(viewport.width);
    canvas.height = Math.floor(viewport.height);
    wrap.appendChild(canvas);
    pagesEl.appendChild(wrap);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    const tc = await page.getTextContent();
    for (const item of tc.items) {
      if (!item.str || !item.str.trim()) continue;
      runCount++;
      const style = tc.styles[item.fontName] || {};
      fonts.add(style.fontFamily || item.fontName);

      // PDF meletakkan teks lewat matriks transform; proyeksikan ke ruang
      // viewport, lalu tinggi glyph = panjang vektor sumbu-Y matriks itu.
      const tx = pdfjs.Util.transform(viewport.transform, item.transform);
      const fh = Math.hypot(tx[2], tx[3]);
      const w = item.width * viewport.scale;

      const box = document.createElement('div');
      box.className = 'run';
      box.style.left = `${tx[4]}px`;
      box.style.top = `${tx[5] - fh}px`;
      box.style.width = `${w}px`;
      box.style.height = `${fh * 1.15}px`;
      box.addEventListener('click', () => {
        if (selected) selected.classList.remove('selected');
        selected = box;
        box.classList.add('selected');
        panel.innerHTML =
          `<b>run</b> "${item.str.replace(/&/g, '&amp;').replace(/</g, '&lt;')}"<br>` +
          `<b>font</b> ${item.fontName} → ${style.fontFamily || '?'}` +
          ` · ${style.ascent ? `ascent ${style.ascent.toFixed(2)}` : ''}` +
          ` · ukuran ±${(fh / viewport.scale).toFixed(1)} pt<br>` +
          `<b>posisi</b> hal ${p} · PDF(${item.transform[4].toFixed(1)}, ${item.transform[5].toFixed(1)})` +
          ` · lebar ${(item.width).toFixed(1)} pt · ${item.hasEOL ? 'akhir baris' : 'tengah baris'}`;
      });
      wrap.appendChild(box);
    }
  }

  const isDigital = runCount > 0;
  routerEl.textContent = isDigital
    ? 'ROUTER: born-digital → tangga teks-asli'
    : 'ROUTER: scan/foto → tangga dokumen-foto';
  routerEl.className = isDigital ? 'digital' : 'scan';
  statsEl.textContent = `${name} · ${doc.numPages} hal (render ${n}) · ${runCount} run · ${fonts.size} font: ${[...fonts].join(', ')}`;
}
</script>
</body>
</html>
